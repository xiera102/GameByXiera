// ═══════════════════════════════════════════════════
// 🎮 GAME 17: CYBER WARRIOR RPG
// ═══════════════════════════════════════════════════
function initRPG(el){
  el.innerHTML=`<div class="rpg-container" style="height:380px;position:relative;">
    <canvas id="rpgCanvas" class="rpg-canvas" width="340" height="340"></canvas>
    <div class="rpg-ui">
      <div class="rpg-stats">⚔️ LEVEL: <span id="rpgLvl">1</span></div>
      <div class="rpg-stats">❤️ HP: <span id="rpgHp">100</span>/100</div>
      <div class="rpg-stats">⭐ EXP: <span id="rpgExp">0</span>/100</div>
      <div class="rpg-stats">💰 COINS: <span id="rpgCoins">0</span></div>
    </div>
    <div style="position:absolute;bottom:12px;right:12px;font-family:Orbitron,monospace;font-size:.7rem;color:var(--nc);">
      WASD = Bergerak | SPACE = Serang
    </div>
  </div>`;
  
  const canvas=document.getElementById('rpgCanvas');
  const ctx=canvas.getContext('2d');
  const TILE=20;
  
  let player={x:8,y:8,hp:100,maxHp:100,level:1,exp:0,coins:0,dir:0};
  let enemies=[],particles=[],keys={};
  let gameTime=0;
  
  function spawnEnemy(){
    if(enemies.length<4&&Math.random()<.02){
      enemies.push({
        x:Math.random()*16+1|0,y:Math.random()*16+1|0,
        hp:20+player.level*5,maxHp:20+player.level*5,
        speed:.8+player.level*.1,dir:Math.random()*Math.PI*2
      });
    }
  }
  
  function update(){
    gameTime+=1/60;
    
    // Player movement
    let dx=0,dy=0;
    if(keys['a']||keys['ArrowLeft'])dx=-1;
    if(keys['d']||keys['ArrowRight'])dx=1;
    if(keys['w']||keys['ArrowUp'])dy=-1;
    if(keys['s']||keys['ArrowDown'])dy=1;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len>0){dx/=len;dy/=len;player.x+=dx*.15;player.y+=dy*.15;player.dir=Math.atan2(dy,dx);}
    
    // Boundary
    player.x=Math.max(0,Math.min(16,player.x));
    player.y=Math.max(0,Math.min(16,player.y));
    
    // Attack
    if(keys[' ']){
      enemies.forEach((e,i)=>{
        const pd=Math.hypot(player.x-e.x,e.y-player.y);
        if(pd<1.2){
          e.hp-=25+player.level*5;
          particles.push({x:e.x,y:e.y,vx:Math.random()*.3-.15,vy:Math.random()*.3-.15,t:30,c:'#ff006e'});
          if(e.hp<=0){
            player.exp+=15+player.level*3;
            player.coins+=5+player.level;
            enemies.splice(i,1);
            if(player.exp>=100){
              player.level++;player.exp=0;player.maxHp+=20;player.hp=player.maxHp;
            }
          }
        }
      });
    }
    
    // Enemy AI
    enemies.forEach(e=>{
      const pd=Math.hypot(player.x-e.x,e.y-player.y);
      if(pd>0.5){
        e.x+=(player.x-e.x)/pd*e.speed*.01;
        e.y+=(player.y-e.y)/pd*e.speed*.01;
      }
      if(pd<.8)player.hp-=1;
    });
    
    // Cleanup
    particles=particles.filter(p=>p.t-->0);
    spawnEnemy();
    
    // Update UI
    document.getElementById('rpgLvl').textContent=player.level;
    document.getElementById('rpgHp').textContent=Math.max(0,player.hp|0);
    document.getElementById('rpgExp').textContent=(player.exp|0);
    document.getElementById('rpgCoins').textContent=player.coins;
    
    if(player.hp<=0){
      ctx.fillStyle='rgba(255,0,110,.9)';ctx.fillRect(0,0,340,340);
      ctx.fillStyle='#fff';ctx.font='bold 32px Orbitron,monospace';
      ctx.textAlign='center';ctx.fillText('GAME OVER',170,170);
      ctx.font='20px Orbitron,monospace';ctx.fillText('R: Restart',170,210);
      return;
    }
  }
  
  function draw(){
    // Background grid
    ctx.fillStyle='#020610';ctx.fillRect(0,0,340,340);
    ctx.strokeStyle='rgba(0,245,255,.03)';
    for(let i=0;i<=17;i++){
      ctx.beginPath();ctx.moveTo(i*TILE,0);ctx.lineTo(i*TILE,340);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*TILE);ctx.lineTo(340,i*TILE);ctx.stroke();
    }
    
    // Particles
    particles.forEach(p=>{
      ctx.save();ctx.translate((p.x-8)*TILE+170,(p.y-8)*TILE+170);
      ctx.globalAlpha=p.t/30;ctx.fillStyle=p.c;ctx.font='16px monospace';
      ctx.fillText('✦',0,0);ctx.restore();
    });
    
    // Enemies
    enemies.forEach(e=>{
      ctx.save();ctx.translate((e.x-8)*TILE+170,(e.y-8)*TILE+170);
      ctx.rotate(gameTime);
      ctx.shadowColor='#ff006e';ctx.shadowBlur=8;
      ctx.fillStyle='#ff006e';ctx.beginPath();
      ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      
      // HP bar
      const hpPct=e.hp/e.maxHp;
      ctx.fillStyle='rgba(255,0,110,.2)';ctx.fillRect(-30,-20,60,6);
      ctx.fillStyle='#ff006e';ctx.fillRect(-30,-20,60*hpPct,6);
      ctx.restore();
    });
    
    // Player
    ctx.save();ctx.translate(170,170);
    ctx.rotate(player.dir);
    ctx.shadowColor='#00f5ff';ctx.shadowBlur=15;
    ctx.fillStyle='#00f5ff';ctx.beginPath();
    ctx.moveTo(0,-18);ctx.lineTo(16,12);ctx.lineTo(-16,12);ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=8;
    ctx.fillStyle='#4ecdc4';ctx.beginPath();
    ctx.arc(0,-4,8,0,Math.PI*2);ctx.fill();
    ctx.restore();
    
    // HP bar player
    const hpPct=player.hp/player.maxHp;
    ctx.fillStyle='rgba(0,245,255,.2)';ctx.fillRect(10,10,120,8);
    ctx.fillStyle='#00f5ff';ctx.fillRect(10,10,120*hpPct,8);
  }
  
  function loop(){
    update();draw();requestAnimationFrame(loop);
  }
  
  document.addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key==='r'&&player.hp<=0){
      player={x:8,y:8,hp:100,maxHp:100,level:1,exp:0,coins:0,dir:0};
      enemies=[];particles=[];
    }
  });
  document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  
  loop();
}

    <div class="platform
